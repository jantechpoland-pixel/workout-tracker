    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #13131a;
            --bg-card-hover: #1a1a24;
            --bg-elevated: #1e1e2a;
            --accent: #6ee7b7;
            --accent-dim: rgba(110, 231, 183, 0.15);
            --accent-glow: rgba(110, 231, 183, 0.3);
            --accent-secondary: #818cf8;
            --accent-secondary-dim: rgba(129, 140, 248, 0.15);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(110, 231, 183, 0.25);
            --danger: #f87171;
            --warning: #fbbf24;
            --success: #6ee7b7;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(110, 231, 183, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(129, 140, 248, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ─── HEADER ─── */
        .header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 28px 24px;
            border-radius: var(--radius-xl);
            margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            position: relative;
            overflow: hidden;
        }

        .header.hidden {
            transform: translateY(-100%) scaleY(0);
            opacity: 0;
            margin-bottom: 0;
            max-height: 0;
            padding: 0;
            overflow: hidden;
            border: none;
        }

        .header-top {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand-label {
            display: inline-block;
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 5px 14px;
            border-radius: 50px;
            margin-bottom: 14px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2em;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
            font-weight: 400;
            margin-top: 6px;
        }

        /* ─── CONTINUE SECTION ─── */
        .continue-btn {
            width: 100%;
            padding: 24px 20px;
            background: linear-gradient(135deg, rgba(110, 231, 183, 0.1) 0%, rgba(129, 140, 248, 0.06) 100%);
            border: 1px solid var(--border-accent);
            color: var(--text-primary);
            border-radius: var(--radius-lg);
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(110, 231, 183, 0.12);
            border-color: var(--accent);
        }

        .continue-btn-label {
            font-size: 0.75em;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .continue-btn-title {
            font-size: 1.3em;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .separator {
            text-align: center;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 0.8em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .start-fresh-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.9em;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-fresh-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.12);
        }

        /* ─── WORKOUT GRID ─── */
        .section-title {
            color: var(--text-secondary);
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 20px;
        }

        .workout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .workout-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-family: 'Outfit', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .workout-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-dim), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .workout-card:hover::before {
            opacity: 1;
        }

        .workout-card:hover {
            border-color: var(--border-accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(110, 231, 183, 0.08);
        }

        .workout-card:active {
            transform: translateY(-1px);
        }

        .workout-card-num {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .workout-card-week {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }

        .week-group-label {
            grid-column: 1 / -1;
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 0 2px;
        }

        .week-group-label:first-child {
            padding-top: 0;
        }

        .back-to-continue-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .back-to-continue-btn:hover {
            color: var(--accent);
            border-color: var(--border-accent);
            background: var(--accent-dim);
        }

        /* ─── PROGRESS BAR ─── */

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            color: var(--text-muted);
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-value {
            color: var(--accent);
            font-size: 0.85em;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.04);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            height: 100%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 3px;
        }

        .overall-progress {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .progress-arrow {
            color: var(--text-muted);
            font-size: 0.85em;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .progress-arrow.open {
            transform: rotate(180deg);
        }

        .history-panel {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s ease, margin 0.35s ease;
            margin-top: 0;
        }

        .history-panel > div {
            overflow: hidden;
        }

        .history-panel.open {
            grid-template-rows: 1fr;
            margin-top: 14px;
        }

        .history-empty {
            color: var(--text-muted);
            font-size: 0.85em;
            text-align: center;
            padding: 12px 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .history-item-name {
            font-size: 0.88em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .history-item-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .history-item-time {
            font-size: 0.78em;
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .history-item-date {
            font-size: 0.75em;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .history-delete-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .history-delete-btn:hover {
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.3);
            background: rgba(248, 113, 113, 0.08);
        }

        /* ─── WORKOUT TIMER (floating) ─── */
        /* ─── INLINE TIMERS ─── */
        .inline-timers {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .inline-timer-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: border-color 0.3s, background 0.3s;
        }

        .inline-timer-pill:hover {
            border-color: var(--border-accent);
        }

        .inline-timer-pill.workout-time-pill {
            cursor: default;
            margin-left: auto;
        }

        .workout-timer-label {
            color: var(--text-muted);
            font-size: 0.6em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 2px;
        }

        .workout-timer-value {
            color: var(--accent);
            font-size: 1.15em;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }

        /* ─── SINGLE VIEW ─── */
        .single-view-container {
            display: none;
            max-width: 520px;
            margin: 0 auto;
        }

        .single-view-container.active {
            display: block;
        }

        /* Navigation */
        .navigation-controls {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--border-accent);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .exercise-counter {
            font-size: 1em;
            font-weight: 700;
            color: var(--text-secondary);
            flex: 1;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
        }

        /* Progress bar (single) */
        .progress-bar-single {
            background: rgba(255, 255, 255, 0.04);
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-fill-single {
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            height: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
        }

        #progressTextSingle {
            position: absolute;
            right: 0;
            top: 10px;
            font-size: 0.7em;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        /* ─── EXERCISE CARDS ─── */
        .superset-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exercise-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 22px 20px;
            border-radius: var(--radius-lg);
            transition: all 0.3s ease;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }

        .exercise-name {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
            flex: 1;
            cursor: pointer;
        }

        .exercise-code {
            background: var(--accent-dim);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8em;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .exercise-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .detail-label {
            font-size: 0.7em;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .notes {
            background: rgba(251, 191, 36, 0.08);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--warning);
            margin-bottom: 14px;
            font-size: 0.88em;
            color: var(--warning);
            font-weight: 500;
        }

        /* ─── WEIGHT LOG ─── */
        .weight-log {
            margin-bottom: 8px;
        }

        .weight-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .weight-value {
            color: var(--accent);
            font-size: 1.2em;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .weight-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            -webkit-appearance: none;
            margin: 8px 0;
        }

        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 12px var(--accent-glow);
            border: 3px solid var(--bg-card);
            transition: box-shadow 0.2s;
        }

        .weight-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .weight-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 12px var(--accent-glow);
            border: 3px solid var(--bg-card);
        }

        .weight-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7em;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .weight-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .weight-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .weight-input::placeholder {
            color: var(--text-muted);
        }

        .previous-weights {
            background: rgba(129, 140, 248, 0.06);
            border-left: 3px solid var(--accent-secondary);
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: var(--radius-sm);
        }

        .prev-weight {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding: 4px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prev-weight:last-child {
            margin-bottom: 0;
        }

        .prev-weight strong {
            color: var(--accent-secondary);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── YOUTUBE / MEDIA ─── */
        .youtube-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            background: rgba(255, 0, 0, 0.1);
            color: #f87171;
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 0, 0, 0.15);
        }

        .youtube-btn:hover {
            background: rgba(255, 0, 0, 0.18);
            transform: translateY(-1px);
        }

        .video-toggle {
            width: 100%;
            padding: 10px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .video-toggle:hover {
            background: rgba(110, 231, 183, 0.2);
        }

        .image-container, .exercise-image-container {
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }

        .exercise-image, .exercise-demo-image {
            width: 100%;
            height: auto;
            display: block;
            max-height: 350px;
            object-fit: cover;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin-bottom: 14px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ─── REST TIMER ─── */

        .inline-timer-pill:not(.workout-time-pill):hover {
            border-color: var(--border-accent);
        }

        /* Smooth fade out when collapsing from fullscreen to pill */
        .inline-timer-pill.collapsing {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* ─── ACTIVE: fullscreen takeover ─── */
        .inline-timer-pill.active {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0;
            padding: 0;
            border: none;
            background: var(--bg-primary);
            box-shadow: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            z-index: 500;
        }

        .inline-timer-pill.active .rest-timer-icon {
            font-size: 1.2em;
            color: var(--text-muted);
            order: 3;
            margin-top: 32px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            transition: all 0.3s;
        }

        .inline-timer-pill.active .rest-timer-icon:hover {
            border-color: var(--border-accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .inline-timer-pill.active .rest-timer-content {
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .inline-timer-pill.active .rest-timer-label {
            font-size: 0.75em;
            color: var(--text-muted);
            letter-spacing: 3px;
        }

        .inline-timer-pill.active .rest-timer-value {
            font-size: 6em;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 60px var(--accent-glow);
        }

        /* ─── DONE: fullscreen with amber ─── */
        .inline-timer-pill.done {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0;
            padding: 0;
            border: none;
            background: var(--bg-primary);
            box-shadow: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            z-index: 500;
            animation: none;
        }

        .inline-timer-pill.done .rest-timer-icon {
            font-size: 1.2em;
            color: var(--warning);
            order: 3;
            margin-top: 32px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(251, 191, 36, 0.25);
            background: rgba(251, 191, 36, 0.08);
        }

        .inline-timer-pill.done .rest-timer-content {
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .inline-timer-pill.done .rest-timer-label {
            font-size: 0.75em;
            color: var(--warning);
            letter-spacing: 3px;
        }

        .inline-timer-pill.done .rest-timer-value {
            font-size: 6em;
            color: var(--warning);
            line-height: 1;
            animation: pulse-glow 1s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 40px rgba(251, 191, 36, 0.15); }
            50% { text-shadow: 0 0 80px rgba(251, 191, 36, 0.35); }
        }

        .inline-timer-pill.done .rest-done-label {
            display: block;
        }

        .rest-done-label {
            display: none;
            font-size: 1.1em;
            font-weight: 700;
            color: var(--warning);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        @keyframes pulse-rest {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .rest-timer-icon {
            font-size: 0.9em;
            color: var(--accent);
            flex-shrink: 0;
            width: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .rest-timer-content {
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .rest-timer-label {
            color: var(--text-muted);
            font-size: 0.6em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .rest-timer-value {
            color: var(--text-primary);
            font-size: 1.15em;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        @media (max-width: 400px) {
            .inline-timer-pill.active .rest-timer-value,
            .inline-timer-pill.done .rest-timer-value {
                font-size: 4.5em;
            }
        }

        /* ─── FINISH WORKOUT ─── */
        .finish-workout-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, rgba(110, 231, 183, 0.15), rgba(110, 231, 183, 0.08));
            color: var(--accent);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-lg);
            font-size: 1.15em;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            margin-top: 16px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .finish-workout-btn:hover {
            background: linear-gradient(135deg, rgba(110, 231, 183, 0.25), rgba(110, 231, 183, 0.12));
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(110, 231, 183, 0.15);
        }

        /* ─── CHECKBOX ─── */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            margin-top: 4px;
        }

        .checkbox-container:hover {
            background: rgba(110, 231, 183, 0.05);
            border-color: var(--border-accent);
        }

        .checkbox-container.completed {
            background: rgba(110, 231, 183, 0.1);
            border-color: var(--accent);
        }

        .checkbox-container.completed label {
            color: var(--accent);
            font-weight: 700;
        }

        .checkbox-container.completed::before {
            content: "✓";
            font-size: 1.2em;
            color: var(--accent);
            font-weight: bold;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: var(--accent);
        }

        .checkbox-container label {
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            font-size: 0.95em;
            color: var(--text-secondary);
            user-select: none;
        }

        /* ─── SUPERSET GROUP ─── */
        .superset-group {

            height: 42px;
            padding: 0;

            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3em;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn-standalone:hover {
            color: var(--accent);
            border-color: var(--border-accent);
            background: var(--accent-dim);
        }

        /* ─── TABS ─── */
        .workout-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            transition: all 0.5s ease;
            transform-origin: top;
        }

        .workout-tabs.hidden {
            transform: translateY(-50px) scaleY(0);
            opacity: 0;
            max-height: 0;
            margin-bottom: 0;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;

            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--border-accent);
        }

        .confetti {

            width: 8px;
            height: 8px;
            animation: confetti-fall 3s linear forwards;
            z-index: 9999;
            border-radius: 2px;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes pulse {
            0%, 100% {

            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 30px var(--accent-glow);
            }

            body { padding: 10px; }

            .exercise-details { grid-template-columns: repeat(2, 1fr); }

            justify-content: center;
            padding: 16px;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;

        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes countUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }

            const workoutKey = `completed-w${currentWorkout}-week${currentWeek}`;
            completedWorkouts[workoutKey] = true;
            
            // Store completion date and duration for history
            const historyEntry = {
                workout: currentWorkout,
                week: currentWeek,
                date: new Date().toISOString(),
                duration: timeString
            };
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            history.push(historyEntry);
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            
            saveState();
            setTimeout(() => saveHistory(), 2000);
            
            updateOverallProgress();
            showWorkoutSummary(timeString);

        function downloadWorkoutCSV() {
            const exercises = workouts[currentWorkout];
            const finalMinutes = Math.floor(workoutElapsedSeconds / 60);
            const finalSeconds = workoutElapsedSeconds % 60;
            const timeString = `${finalMinutes}:${finalSeconds.toString().padStart(2, '0')}`;
            const today = new Date().toISOString().split('T')[0];
            
            // CSV header
            const rows = [];
            rows.push(['Trening ' + currentWorkout + ' - Tydzień ' + currentWeek]);
            rows.push(['Data', today]);
            rows.push(['Czas treningu', timeString]);
            rows.push([]);
            rows.push(['Kod', 'Ćwiczenie', 'Serie', 'Powtórzenia', 'Tempo', 'Odpoczynek', 'Ciężar wykonany']);
            
            exercises.forEach(ex => {
                const exerciseId = `w${currentWorkout}-week${currentWeek}-${ex.code}`;
                const weight = weightLog[exerciseId] || '';
                // Escape commas and quotes in exercise names
                const safeName = '"' + ex.name.replace(/"/g, '""') + '"';
                const safeReps = '"' + String(ex.reps).replace(/"/g, '""') + '"';
                rows.push([
                    ex.code,
                    safeName,
                    ex.sets,
                    safeReps,
                    ex.tempo,
                    ex.rest,
                    weight
                ]);
            });
            
            // Add BOM for proper Polish character encoding in Excel
            const bom = '\uFEFF';
            const csvContent = bom + rows.map(r => r.join(',')).join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `trening${currentWorkout}_tydzien${currentWeek}_${today}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function nextExercise() {

        let timerEndTime = null; // real clock target

        function startTimer() {
            const el = document.getElementById('timerDisplay');
            if (timerRunning) {
                // Pause — collapse back to pill, save remaining
                timerSeconds = Math.max(0, Math.round((timerEndTime - Date.now()) / 1000));
                timerEndTime = null;
                stopTimer();
            } else if (timerSeconds === 0 && el.classList.contains('done')) {
                // Timer done, tap to dismiss & reset
                resetTimer();
            } else if (timerSeconds > 0) {
                // Start countdown — fullscreen takeover
                timerRunning = true;
                timerEndTime = Date.now() + timerSeconds * 1000;
                el.classList.add('active');
                el.classList.remove('done');
                document.getElementById('restTimerIcon').textContent = '⏸';
                timerInterval = setInterval(() => {
                    const remaining = Math.round((timerEndTime - Date.now()) / 1000);
                    if (remaining > 0) {
                        timerSeconds = remaining;
                        updateTimerDisplay();
                    } else {
                        timerSeconds = 0;
                        updateTimerDisplay();
                        timerRunning = false;
                        timerEndTime = null;
                        clearInterval(timerInterval);
                        el.classList.remove('active');
                        el.classList.add('done');
                        document.getElementById('restTimerIcon').textContent = '✓';
                        playTimerAlert();
                    }
                }, 250); // check 4x/sec for snappy updates on resume
            }
        }

        // When tab becomes visible again, immediately sync the display
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && timerRunning && timerEndTime) {
                const remaining = Math.round((timerEndTime - Date.now()) / 1000);
                const el = document.getElementById('timerDisplay');
                if (remaining <= 0) {
                    // Timer finished while backgrounded
                    timerSeconds = 0;
                    updateTimerDisplay();
                    timerRunning = false;
                    timerEndTime = null;
                    clearInterval(timerInterval);
                    el.classList.remove('active');
                    el.classList.add('done');
                    document.getElementById('restTimerIcon').textContent = '✓';
                    playTimerAlert();
                } else {
                    timerSeconds = remaining;
                    updateTimerDisplay();
                }
            }
        });

        function stopTimer() {
            timerRunning = false;
            timerEndTime = null;
            clearInterval(timerInterval);
            const el = document.getElementById('timerDisplay');
            const wasExpanded = el.classList.contains('active') || el.classList.contains('done');
            
            if (wasExpanded) {
                // Fade out fullscreen, then snap to pill
                el.classList.add('collapsing');
                setTimeout(() => {
                    el.classList.remove('active');
                    el.classList.remove('done');
                    el.classList.remove('collapsing');
                    document.getElementById('restTimerIcon').textContent = '▶';
                }, 350);
            } else {
                el.classList.remove('active');
                el.classList.remove('done');
                document.getElementById('restTimerIcon').textContent = '▶';
            }
        }

        function resetTimer() {
            const el = document.getElementById('timerDisplay');
            const wasExpanded = el.classList.contains('active') || el.classList.contains('done');
            
            stopTimer();
            
            // Delay the value reset to after the fade animation
            const delay = wasExpanded ? 360 : 0;
            setTimeout(() => {
                el.classList.remove('done');
                const exercises = workouts[currentWorkout];
                
                const supersets = [];
                let currentGroup = [];
                let currentLetter = null;
                
                exercises.forEach((ex) => {
                    const letter = ex.code.charAt(0);
                    if (letter !== currentLetter) {
                        if (currentGroup.length > 0) {
                            supersets.push(currentGroup);
                        }
                        currentGroup = [ex];
                        currentLetter = letter;
                    } else {
                        currentGroup.push(ex);
                    }
                });
                if (currentGroup.length > 0) {
                    supersets.push(currentGroup);
                }
                
                const currentSuperset = supersets[currentExerciseIndex];
                const lastEx = currentSuperset[currentSuperset.length - 1];
                
                let restSeconds = 0;
                if (lastEx.rest && lastEx.rest !== '-') {
                    if (lastEx.rest.toLowerCase().includes('sek') || lastEx.rest.toLowerCase().includes('sec')) {
                        const restMatch = lastEx.rest.match(/(\d+)/);
                        if (restMatch) {
                            restSeconds = parseInt(restMatch[1]);
                        }
                    } else {
                        const restMatch = lastEx.rest.match(/(\d+)/);
                        if (restMatch) {
                            restSeconds = parseInt(restMatch[1]) * 60;
                        }
                    }
                }
                
                timerSeconds = restSeconds;
                updateTimerDisplay();
            }, delay);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timerSeconds / 60);
            const seconds = timerSeconds % 60;
            document.getElementById('timerTime').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function playTimerAlert() {
            const display = document.getElementById('timerDisplay');
            
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                for (let i = 0; i < 10; i++) {
                    const frequency = i % 2 === 0 ? 880 : 1100;
                    const delay = i * 350;
                    setTimeout(() => playBeep(audioContext, frequency, 0.85, 0.25), delay);
                }
            } catch (error) {
                console.error('Audio playback error:', error);
            }
        }

        function playBeep(audioContext, frequency, volume, duration) {
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (error) {
                console.error('Beep error:', error);
            }
        }

        let clickTimer = null;
        let clickCount = 0;

        function switchWorkout(workoutNum, evt) {
            const targetEvent = evt || window.event;
            clickCount++;
            
            if (clickCount === 1) {
                clickTimer = setTimeout(() => {
                    currentWorkout = workoutNum;
                    currentExerciseIndex = 0;
                    
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    if (targetEvent && targetEvent.target) {
                        targetEvent.target.classList.add('active');
                    }
                    
                    if (!document.getElementById('mainHeader').classList.contains('hidden')) {
                        renderSingleExercise();
                        document.getElementById('single-view').classList.add('active');
                    }
                    
                    clickCount = 0;
                }, 300);
            } else {
                clearTimeout(clickTimer);
                clickCount = 0;
                
                currentWorkout = workoutNum;
                currentExerciseIndex = 0;
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                if (targetEvent && targetEvent.target) {
                    targetEvent.target.classList.add('active');
                }
                
                renderSingleExercise();
                document.getElementById('single-view').classList.add('active');
                
                setTimeout(() => {
                    document.getElementById('mainHeader').classList.add('hidden');
                    document.querySelector('.workout-tabs').classList.add('hidden');
                }, 100);
            }
        }

        function startWorkoutDirect(week, workout) {
            currentWeek = week;
            currentWorkout = workout;
            currentExerciseIndex = 0;
            
            localStorage.setItem('lastWorkout', JSON.stringify({ week, workout }));
            saveState();
            
            startWorkoutTimer();
            
            document.getElementById('mainHeader').classList.add('hidden');
            document.getElementById('single-view').style.display = 'block';
            
            renderSingleExercise();
        }

        function startWorkoutTimer() {
            workoutStartTime = Date.now();
            workoutElapsedSeconds = 0;
            updateWorkoutTimerDisplay();
            
            workoutTimerInterval = setInterval(() => {
                workoutElapsedSeconds = Math.floor((Date.now() - workoutStartTime) / 1000);
                updateWorkoutTimerDisplay();
            }, 1000);
        }

        function stopWorkoutTimer() {
            if (workoutTimerInterval) {
                clearInterval(workoutTimerInterval);
                workoutTimerInterval = null;
            }
        }

        function updateWorkoutTimerDisplay() {
            const minutes = Math.floor(workoutElapsedSeconds / 60);
            const seconds = workoutElapsedSeconds % 60;
            document.getElementById('workoutTimerDisplay').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function continueLastWorkout() {
            const last = JSON.parse(localStorage.getItem('lastWorkout'));
            if (last) {
                startWorkoutDirect(last.week, last.workout);
            }
        }

        function showAllWorkouts() {
            document.getElementById('continueSection').style.display = 'none';
            document.getElementById('allWorkoutsSection').style.display = 'block';
            
            const last = localStorage.getItem('lastWorkout');
            if (last) {
                document.getElementById('backToContinueBtn').style.display = 'block';
            }
        }

        function backToContinue() {
            document.getElementById('continueSection').style.display = 'block';
            document.getElementById('allWorkoutsSection').style.display = 'none';
        }

        function initializeApp() {
            const last = localStorage.getItem('lastWorkout');
            if (last) {
                const { week, workout } = JSON.parse(last);
                document.getElementById('continueText').textContent = `Trening ${workout} · Tydzień ${week}`;
                document.getElementById('continueSection').style.display = 'block';
                document.getElementById('allWorkoutsSection').style.display = 'none';
            } else {
                document.getElementById('continueSection').style.display = 'none';
                document.getElementById('allWorkoutsSection').style.display = 'block';
            }
            
            updateOverallProgress();
            renderHistory();
        }

        function updateOverallProgress() {
            const totalWorkouts = 9;
            
            let completedCount = 0;
            for (let week = 1; week <= 3; week++) {
                for (let workoutNum = 1; workoutNum <= 3; workoutNum++) {
                    const workoutKey = `completed-w${workoutNum}-week${week}`;
                    if (completedWorkouts[workoutKey]) {
                        completedCount++;
                    }
                }
            }
            
            const progressPercent = Math.round((completedCount / totalWorkouts) * 100);
            document.getElementById('overallProgressFill').style.width = progressPercent + '%';
            document.getElementById('overallProgressText').textContent = progressPercent + '%';
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            const arrow = document.getElementById('historyArrow');
            panel.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const container = document.getElementById('historyContent');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="history-empty">Brak ukończonych treningów</div>';
                return;
            }
            
            // Show most recent first, track original index
            let html = '';
            for (let i = history.length - 1; i >= 0; i--) {
                const entry = history[i];
                const d = new Date(entry.date);
                const dayName = d.toLocaleDateString('pl-PL', { weekday: 'short' });
                const dateStr = d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit' });
                
                html += `
                    <div class="history-item" id="history-item-${i}">
                        <div class="history-item-left">
                            <div class="history-item-dot"></div>
                            <div class="history-item-name">T${entry.workout} · Tydz ${entry.week}</div>
                        </div>
                        <div class="history-item-right">
                            <span class="history-item-time">${entry.duration}</span>
                            <span class="history-item-date">${dayName} ${dateStr}</span>
                            <button class="history-delete-btn" onclick="event.stopPropagation(); deleteWorkoutEntry(${i})">×</button>
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function deleteWorkoutEntry(index) {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const entry = history[index];
            
            if (!entry) return;
            
            // Remove completion flag
            const workoutKey = `completed-w${entry.workout}-week${entry.week}`;
            delete completedWorkouts[workoutKey];
            
            // Remove from history
            history.splice(index, 1);
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            
            // Animate out
            const el = document.getElementById(`history-item-${index}`);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'translateX(20px)';
                el.style.transition = 'all 0.3s ease';
                setTimeout(() => {
                    el.style.height = el.offsetHeight + 'px';
                    el.offsetHeight; // force reflow
                    el.style.height = '0';
                    el.style.padding = '0';
                    el.style.margin = '0';
                    el.style.borderBottom = 'none';
                    el.style.overflow = 'hidden';
                    setTimeout(() => {
                        updateOverallProgress();
                        renderHistory();
                        saveState();
                        saveHistory();
                    }, 300);
                }, 200);
            } else {
                updateOverallProgress();
                renderHistory();
                saveState();
                saveHistory();
            }
        }

        function selectWeek(week) {
            currentWeek = week;
            document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('single-view').classList.add('active');
            renderSingleExercise();
        }

        function showMainMenu() {
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('single-view').style.display = 'none';
            
            stopWorkoutTimer();
            stopTimer();
            initializeApp();
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerRunning = false;
            }
        }

        // ─── SUPABASE STORAGE ───
        const SUPABASE_URL = 'https://skddyriiakmtvgpdfffq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EiXpb-nZgMcxXJnFnowqSg_Nk918Z-s';

        let completedWorkouts = {};
        let saveTimeout = null;

        async function dbGet(key) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${key}&select=value`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                if (!res.ok) { console.error('dbGet error:', res.status, await res.text()); return null; }
                const rows = await res.json();
                return rows.length > 0 ? rows[0].value : null;
            } catch (e) {
                console.error('dbGet failed:', e);
                return null;
            }
        }

        async function dbSet(key, value) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'resolution=merge-duplicates'
                    },
                    body: JSON.stringify({ key, value })
                });
                if (!res.ok) { console.error('dbSet error:', res.status, await res.text()); }
            } catch (e) {
                console.error('dbSet failed:', e);
            }
        }

        async function loadAllData() {
            try {
                const stateRaw = await dbGet('tracker-state');
                if (stateRaw) {
                    const state = JSON.parse(stateRaw);
                    completedExercises = state.completedExercises || {};
                    weightLog = state.weightLog || {};
                    completedWorkouts = state.completedWorkouts || {};
                    if (state.lastWorkout) {
                        localStorage.setItem('lastWorkout', JSON.stringify(state.lastWorkout));
                    }
                }
            } catch (e) {}

            try {
                const histRaw = await dbGet('tracker-history');
                if (histRaw) {
                    localStorage.setItem('workoutHistory', histRaw);
                }
            } catch (e) {}
        }

        function debouncedSaveState() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveState(), 1500);
        }

        async function saveState() {
            const lastRaw = localStorage.getItem('lastWorkout');
            const state = {
                completedExercises,
                weightLog,
                completedWorkouts,
                lastWorkout: lastRaw ? JSON.parse(lastRaw) : null
            };
            // Local backup
            localStorage.setItem('tracker-state-local', JSON.stringify(state));
            // Cloud save
            await dbSet('tracker-state', JSON.stringify(state));
        }

        async function saveHistory() {
            const hist = localStorage.getItem('workoutHistory') || '[]';
            localStorage.setItem('tracker-history-local', hist);
            await dbSet('tracker-history', hist);
        }

        // Initialize app with persistent data
        async function boot() {
            await loadAllData();
            initializeApp();
        }

        boot();
    </script>
</body>
